<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Teal Gradient -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>

    <!-- Cyan Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>

    <!-- Orange Accent Gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular Mask Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="3" />

  <!-- Grid lines (Physics representation) -->
  <path d="M 100 20 L 100 180 M 20 100 L 180 100" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,4" />
  <circle cx="100" cy="100" r="50" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="2,4" />
  <circle cx="100" cy="100" r="75" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="2,4" />

  <!-- Classical Law Curve (Newtonian baseline: quadratic/parabolic shape in background) -->
  <path d="M 30 150 Q 100 80 170 150" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="4,6" opacity="0.6" />

  <!-- Observed Anomaly Points (Noisy Data) -->
  <circle cx="50" cy="120" r="3.5" fill="url(#orangeGrad)" />
  <circle cx="75" cy="98" r="3.5" fill="url(#orangeGrad)" />
  <circle cx="100" cy="85" r="3.5" fill="url(#orangeGrad)" />
  <circle cx="125" cy="98" r="3.5" fill="url(#orangeGrad)" />
  <circle cx="150" cy="120" r="3.5" fill="url(#orangeGrad)" />

  <!-- Corrected theory curve (ADCD Discovery: smooth curve fitting the points) -->
  <path d="M 35 130 Q 100 70 165 130" fill="none" stroke="url(#tealGrad)" stroke-width="4.5" filter="url(#glow)" stroke-linecap="round" />

  <!-- Physics / Atom Orbit representation (Intersecting Ellipse) -->
  <ellipse cx="100" cy="100" rx="80" ry="25" fill="none" stroke="url(#cyanGrad)" stroke-width="2.5" transform="rotate(-30 100 100)" />
  
  <!-- Nucleus / Core Dot -->
  <circle cx="100" cy="100" r="7" fill="url(#tealGrad)" filter="url(#glow)" />
  
  <!-- Orbit Electron Dot -->
  <circle cx="31" cy="60" r="4.5" fill="url(#cyanGrad)" filter="url(#glow)" />
</svg>
