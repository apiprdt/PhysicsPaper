site_name: ADCD — Anomaly-Driven Correction Discovery
site_url: https://apiprdt.github.io/PhysicsPaper/
site_description: >-
  Physics-constrained symbolic regression that discovers correction terms
  rather than learning equations from scratch. Automates the same step
  that led from Newton to Einstein.
site_author: Muhammad Afif Erdita
repo_name: apiprdt/PhysicsPaper
repo_url: https://github.com/apiprdt/PhysicsPaper
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Muhammad Afif Erdita — MIT License

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/adcd_logo.svg
  favicon: assets/adcd_logo.svg
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

extra:
  version:
    provider: mike
    default: stable
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/apiprdt/PhysicsPaper
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/adcd/
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            docstring_section_style: spacy

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: apiprdt
      repo: PhysicsPaper
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Your First Discovery: getting-started/first-discovery.md
  - User Guide:
    - user-guide/index.md
    - Core Concepts: user-guide/concepts.md
    - Scenarios: user-guide/scenarios.md
    - Physics Gates: user-guide/gates.md
    - Proposers: user-guide/proposers.md
    - Configuration: user-guide/configuration.md
    - Export & Visualization: user-guide/export.md
  - Benchmarks:
    - benchmarks/index.md
    - Standard Benchmark: benchmarks/standard.md
    - PySR Comparison: benchmarks/pysr.md
    - Noise Robustness: benchmarks/noise.md
    - Real-World Validation: benchmarks/real-world.md
  - API Reference:
    - api/index.md
    - adcd.fit: api/fit.md
    - adcd.discover_correction: api/discover_correction.md
    - Scenarios: api/scenarios.md
    - Result: api/result.md
  - Paper: paper.md
  - Changelog: changelog.md
